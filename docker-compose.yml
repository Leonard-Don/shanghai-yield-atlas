services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: yieldwise-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: yieldwise
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_local_dev}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - yieldwise-postgis-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d yieldwise"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    image: yieldwise:local
    container_name: yieldwise-app
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://atlas:${POSTGRES_PASSWORD:-atlas_local_dev}@postgis:5432/yieldwise
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-please-replace-in-production}
      ATLAS_ADMIN_USERNAME: ${ATLAS_ADMIN_USERNAME:-admin}
      ATLAS_ADMIN_PASSWORD: ${ATLAS_ADMIN_PASSWORD:-changeme-after-first-login}
      AMAP_API_KEY: ${AMAP_API_KEY:-}
      AMAP_SECURITY_JSCODE: ${AMAP_SECURITY_JSCODE:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Persist staged customer-data runs across container restarts.
      - yieldwise-tmp:/app/tmp

volumes:
  yieldwise-postgis-data:
  yieldwise-tmp:
