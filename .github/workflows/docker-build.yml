name: Docker

# Build the app image and bring up the full stack (postgis + app) on each
# push, then smoke-test /api/health. The repo author dev's locally without
# Docker; this workflow gives independent verification that `docker compose
# up -d --build` works on a clean machine — which is what new visitors run.

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - ".env.example"
      - "api/**"
      - "frontend/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - ".env.example"
      - "api/**"
      - "frontend/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  docker-build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose syntax
        run: docker compose config

      - name: Seed .env from example
        # docker-compose.yml reads ${...:-default} envs; .env.example contains
        # safe local-dev defaults so a fresh checkout boots without manual editing.
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Bring up stack
        run: docker compose up -d

      - name: Wait for app health
        # /api/health is public (no auth gate). Poll until ready or fail after 90s.
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health >/dev/null; then
              echo "ok"; exit 0
            fi
            sleep 3
          done
          echo "app did not become healthy in 90s"
          docker compose logs --no-color
          exit 1

      - name: Smoke /api/v2/customer-data/templates/portfolio.csv (public asset)
        # Template downloads sit behind /api/v2/* auth, so we expect 401 here —
        # a 401 confirms the route is wired (404 would mean the router isn't
        # mounted). Useful as a 30-second sanity check that the image actually
        # serves the M3 customer-data domain.
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v2/customer-data/templates/portfolio.csv)
          if [ "$status" = "401" ]; then
            echo "401 as expected — auth wall reachable"
          else
            echo "unexpected status $status"
            docker compose logs --no-color
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
