name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python deps
        run: pip install -r api/requirements-dev.txt

      - name: Python compile check
        run: python3 -m compileall api jobs scripts

      - name: Ruff lint
        run: python3 -m ruff check .

      - name: Backstage JS syntax check
        run: |
          for file in frontend/backstage/data/*.js frontend/backstage/lib/*.js frontend/backstage/app.js; do
            node --check "$file"
          done

      - name: User shell JS syntax check
        run: node --check frontend/user/modules/main.js

      - name: Frontend unit tests
        run: node --test tests/frontend/*.mjs

      - name: Pytest
        run: pytest -q

      - name: Phase 1 route smoke
        run: python3 scripts/phase1_smoke.py
