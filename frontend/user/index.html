<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shanghai Yield Atlas</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/shell.css" />
    <link rel="stylesheet" href="/styles/map.css" />
    <link rel="stylesheet" href="/styles/board.css" />
    <link rel="stylesheet" href="/styles/drawer.css" />
    <link rel="stylesheet" href="/styles/onboarding.css" />
  </head>
  <body data-user-shell="atlas">
    <div class="atlas-shell">
      <header class="atlas-topbar">
        <h1>Shanghai · Yield · Atlas</h1>
        <nav class="atlas-modes" data-component="mode-chips" aria-label="模式切换"></nav>
        <div class="atlas-topbar-spacer"></div>
        <span class="atlas-star-tag mono" data-component="watchlist-count" title="关注数">★ —</span>
        <button type="button" class="atlas-prefs-button" data-component="prefs-button">偏好</button>
        <span class="atlas-runtime-tag mono dim" data-component="runtime-tag"></span>
      </header>
      <div class="atlas-filterbar" data-component="filter-bar">
        <div class="atlas-filter-chips" data-role="filter-chips"></div>
        <div class="atlas-filter-spacer"></div>
        <span class="atlas-filter-count mono dim" data-role="filter-count">—</span>
      </div>
      <main class="atlas-main">
        <section class="atlas-map" id="atlas-map" data-component="map">
          <div class="atlas-placeholder" data-role="map-placeholder">地图加载中…</div>
        </section>
        <aside class="atlas-board" data-component="board">
          <div class="atlas-board-header mono">
            <span data-role="board-count">--</span>
            <span class="dim" data-role="board-mode-label">--</span>
          </div>
          <ol class="atlas-board-list" data-role="board-list"></ol>
          <div class="atlas-board-empty" data-role="board-empty" hidden>暂无机会</div>
        </aside>
        <div class="atlas-drawer-backdrop" data-component="drawer-backdrop" data-open="false"></div>
        <aside class="atlas-drawer" data-component="drawer" data-open="false" aria-hidden="true">
          <header class="atlas-drawer-header">
            <div>
              <h2 class="atlas-drawer-title" data-role="drawer-title">—</h2>
              <span class="atlas-drawer-subtitle mono" data-role="drawer-subtitle">—</span>
            </div>
            <div class="atlas-drawer-actions">
              <button type="button" class="atlas-drawer-star" data-component="drawer-star" aria-pressed="false" hidden>★</button>
              <button type="button" class="atlas-drawer-close" data-role="drawer-close" aria-label="关闭">×</button>
            </div>
          </header>
          <div class="atlas-drawer-body" data-role="drawer-body">
            <div class="atlas-drawer-empty">选择楼栋或机会榜条目以查看详情</div>
          </div>
        </aside>
        <div class="atlas-onboarding-backdrop" data-component="onboarding-backdrop" data-open="false"></div>
        <section class="atlas-onboarding" data-component="onboarding" data-open="false" aria-hidden="true" aria-labelledby="atlas-onboarding-title">
          <header class="atlas-onboarding-header">
            <h2 id="atlas-onboarding-title" class="atlas-onboarding-title">自住找房 · 偏好设定</h2>
            <button type="button" class="atlas-onboarding-close" data-role="onboarding-close" aria-label="关闭">×</button>
          </header>
          <form class="atlas-onboarding-form" data-role="onboarding-form" novalidate>
            <fieldset class="atlas-onboarding-fieldset">
              <legend>预算（万元）<span class="atlas-onboarding-required">*</span></legend>
              <div class="atlas-onboarding-pair">
                <label>下限<input type="number" name="budget_min_wan" min="0" step="10" placeholder="0" /></label>
                <label>上限<input type="number" name="budget_max_wan" min="0" step="10" placeholder="必填" required /></label>
              </div>
            </fieldset>
            <fieldset class="atlas-onboarding-fieldset">
              <legend>优先区域</legend>
              <div class="atlas-onboarding-districts" data-role="onboarding-districts"></div>
            </fieldset>
            <fieldset class="atlas-onboarding-fieldset">
              <legend>面积（平米）</legend>
              <div class="atlas-onboarding-pair">
                <label>下限<input type="number" name="area_min_sqm" min="0" step="5" placeholder="0" /></label>
                <label>上限<input type="number" name="area_max_sqm" min="0" step="5" placeholder="无上限" /></label>
              </div>
            </fieldset>
            <footer class="atlas-onboarding-actions">
              <span class="atlas-onboarding-status mono dim" data-role="onboarding-status">填写后保存到 data/personal/user_prefs.json</span>
              <button type="submit" class="atlas-onboarding-submit" data-role="onboarding-submit" disabled>保存</button>
            </footer>
          </form>
        </section>
      </main>
      <footer class="atlas-statusbar mono" data-component="statusbar">
        <span data-role="statusbar-mode">mode: --</span>
        <span data-role="statusbar-data">data: --</span>
        <span data-role="statusbar-build">phase 3a</span>
      </footer>
    </div>
    <script type="module" src="/modules/main.js"></script>
  </body>
</html>
